name: Agent Governance Validation

on:
  pull_request:
    branches: [main]
    paths: ['AGENTS.md', 'repo.intelligence.yml', 'docs/**', '.github/**']

jobs:
  validate-governance:
    runs-on: ubuntu-latest
    if: contains(github.head_ref, 'agent-operating-system-install') || contains(github.head_ref, 'governance')
    steps:
      - uses: actions/checkout@v4
      - run: [ -f AGENTS.md ] && echo "present" || (echo "missing" && exit 1)
      - run: echo "Repo: UCA-WebPage | Tier: 2"
